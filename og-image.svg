<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="300" fill="rgba(99,102,241,0.08)"/>
  <circle cx="1100" cy="500" r="200" fill="rgba(129,140,248,0.06)"/>
  <circle cx="200" cy="550" r="150" fill="rgba(99,102,241,0.05)"/>

  <!-- Note icon (decorative) -->
  <g transform="translate(80, 140)" fill="none" stroke="#818cf8" stroke-width="12" stroke-linecap="round" opacity="0.3">
    <rect x="0" y="0" width="180" height="220" rx="20" fill="rgba(129,140,248,0.08)" stroke="#818cf8"/>
    <path d="M140 0 v40 a20 20 0 0 0 20 20 h40" fill="rgba(129,140,248,0.08)" stroke="#818cf8"/>
    <line x1="30" y1="70" x2="150" y2="70"/>
    <line x1="30" y1="100" x2="130" y2="100"/>
    <line x1="30" y1="130" x2="110" y2="130"/>
  </g>

  <!-- Main content -->
  <g transform="translate(100, 180)">
    <!-- Deploy on Railway badge -->
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#6C3FC5"/>
    <text x="15" y="25" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff">🚀 Deploy on Railway</text>

    <!-- Project name -->
    <text x="0" y="105" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Memos</text>

    <!-- Tagline -->
    <text x="0" y="160" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#a5b4fc">Open-source, self-hosted note-taking.</text>
    <text x="0" y="200" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#a5b4fc">Markdown-native. One-click deploy.</text>

    <!-- Metrics bar -->
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="800" height="1" fill="rgba(255,255,255,0.1)"/>
      <!-- Star count -->
      <text x="0" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#818cf8">⭐ 61,000+ GitHub Stars</text>
      <text x="250" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#818cf8">📦 ~20MB Docker Image</text>
      <text x="540" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#818cf8">⚡ &lt;128MB RAM</text>
      <!-- License -->
      <text x="0" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#6366f1">MIT License · Single Go Binary · PostgreSQL Ready</text>
    </g>
  </g>

  <!-- Railway branding -->
  <g transform="translate(60, 555)">
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#3730a3">railway.app/template/memos-3</text>
  </g>
  <g transform="translate(1060, 555)">
    <text x="100" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#3730a3" text-anchor="end">github.com/INAPP-Mobile/railway-memos</text>
  </g>
</svg>
