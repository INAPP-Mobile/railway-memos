<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" rx="160" fill="url(#bg)"/>
  <!-- Note/memo icon -->
  <g transform="translate(160, 140)" fill="none" stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- Page outline -->
    <rect x="40" y="40" width="400" height="480" rx="32" fill="rgba(255,255,255,0.15)" stroke="#fff"/>
    <!-- Folded corner -->
    <path d="M320 40 v80 a40 40 0 0 0 40 40 h80" fill="rgba(255,255,255,0.15)" stroke="#fff"/>
    <!-- Writing lines -->
    <line x1="100" y1="180" x2="380" y2="180"/>
    <line x1="100" y1="250" x2="350" y2="250"/>
    <line x1="100" y1="320" x2="320" y2="320"/>
    <line x1="100" y1="390" x2="370" y2="390"/>
    <!-- Checkmark -->
    <polyline points="310,190 330,210 380,160" stroke-width="24" stroke="#a5b4fc"/>
  </g>
</svg>
