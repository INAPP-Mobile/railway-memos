<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Notepad -->
  <g transform="translate(400,390)">
    <rect x="-140" y="-150" width="280" height="300" rx="16" fill="url(#pad)" opacity="0.9"/>
    <!-- Spiral binding -->
    <rect x="-125" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="-100" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="-75" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="-50" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="-25" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="0" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="25" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="50" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="75" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <rect x="100" y="-140" width="10" height="18" rx="5" fill="#A5B4FC" opacity="0.5"/>
    <!-- Ruled lines -->
    <line x1="-115" y1="-80" x2="115" y2="-80" stroke="#A5B4FC" stroke-width="2" opacity="0.25"/>
    <line x1="-115" y1="-40" x2="115" y2="-40" stroke="#A5B4FC" stroke-width="2" opacity="0.25"/>
    <line x1="-115" y1="0" x2="80" y2="0" stroke="#A5B4FC" stroke-width="2" opacity="0.25"/>
    <line x1="-115" y1="40" x2="115" y2="40" stroke="#A5B4FC" stroke-width="2" opacity="0.25"/>
    <line x1="-115" y1="80" x2="60" y2="80" stroke="#A5B4FC" stroke-width="2" opacity="0.25"/>
  </g>
  <!-- Pencil -->
  <g transform="translate(530,530) rotate(-45)">
    <rect x="-12" y="-70" width="24" height="75" rx="3" fill="url(#pencil)"/>
    <polygon points="-12,5 0,35 12,5" fill="#FDE68A"/>
    <polygon points="-4,5 0,28 4,5" fill="#1E1B4B" opacity="0.3"/>
    <rect x="-12" y="-8" width="24" height="13" rx="2" fill="#C4B5FD"/>
  </g>
  <!-- Accent -->
  <circle cx="160" cy="190" r="6" fill="#6366F1" opacity="0.4"/>
  <circle cx="640" cy="620" r="5" fill="#8B5CF6" opacity="0.3"/>
</svg>