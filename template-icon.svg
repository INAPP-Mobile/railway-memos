<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730A3"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Large notepad -->
  <rect x="230" y="130" width="340" height="480" rx="24" fill="#FFFFFF"/>
  <!-- Spiral binding -->
  <circle cx="270" cy="150" r="14" fill="#3730A3"/>
  <circle cx="320" cy="150" r="14" fill="#3730A3"/>
  <circle cx="370" cy="150" r="14" fill="#3730A3"/>
  <circle cx="420" cy="150" r="14" fill="#3730A3"/>
  <circle cx="470" cy="150" r="14" fill="#3730A3"/>
  <circle cx="520" cy="150" r="14" fill="#3730A3"/>
  <!-- Ruled lines -->
  <line x1="270" y1="240" x2="530" y2="240" stroke="#6C3FC5" stroke-width="6" stroke-linecap="round"/>
  <line x1="270" y1="300" x2="530" y2="300" stroke="#6C3FC5" stroke-width="6" stroke-linecap="round"/>
  <line x1="270" y1="360" x2="480" y2="360" stroke="#6C3FC5" stroke-width="6" stroke-linecap="round"/>
  <line x1="270" y1="420" x2="530" y2="420" stroke="#6C3FC5" stroke-width="6" stroke-linecap="round"/>
  <line x1="270" y1="480" x2="400" y2="480" stroke="#6C3FC5" stroke-width="6" stroke-linecap="round"/>
</svg>