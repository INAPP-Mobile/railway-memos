<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background: #0f172a; font-family: 'JetBrains Mono', monospace;">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Grid background -->
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="45" fill="#e2e8f0" font-size="18" font-weight="bold" text-anchor="middle">Memos on Railway — Architecture</text>
  <text x="400" y="65" fill="#64748b" font-size="11" text-anchor="middle">One-click deploy · Markdown-native note-taking · Self-hosted</text>

  <!-- Internet / User -->
  <rect x="320" y="85" width="160" height="40" rx="20" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="110" fill="#f1f5f9" font-size="13" text-anchor="middle" font-weight="bold">🌐 Users / Browser</text>

  <!-- Arrow: Users → Railway Router -->
  <line x1="400" y1="125" x2="400" y2="155" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- Railway Router -->
  <rect x="260" y="160" width="280" height="50" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="182" fill="#22d3ee" font-size="13" text-anchor="middle" font-weight="bold">Railway Edge Router</text>
  <text x="400" y="197" fill="#67e8f9" font-size="9" text-anchor="middle">HTTPS · Auto SSL · *.railway.app domain</text>

  <!-- Arrow down -->
  <line x1="400" y1="210" x2="400" y2="240" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- Memos Container Box -->
  <rect x="140" y="245" width="250" height="120" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="265" y="270" fill="#34d399" font-size="13" text-anchor="middle" font-weight="bold">📝 Memos Container</text>
  <text x="265" y="288" fill="#6ee7b7" font-size="9" text-anchor="middle">neosmemo/memos:stable</text>
  <line x1="170" y1="296" x2="360" y2="296" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>
  <text x="265" y="312" fill="#a7f3d0" font-size="9" text-anchor="middle">Port 5230 · &lt;128MB RAM · ~20MB image</text>
  <text x="265" y="326" fill="#a7f3d0" font-size="9" text-anchor="middle">Health: GET /health · SQLite driver</text>
  <text x="265" y="340" fill="#a7f3d0" font-size="9" text-anchor="middle">Go binary · Non-root user (UID 10001)</text>

  <!-- Persistent Volume -->
  <rect x="60" y="245" width="60" height="120" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="90" y="280" fill="#a78bfa" font-size="9" text-anchor="middle" font-weight="bold">📦</text>
  <text x="90" y="296" fill="#a78bfa" font-size="8" text-anchor="middle">Volume</text>
  <text x="90" y="310" fill="#c4b5fd" font-size="7" text-anchor="middle">50 GB</text>
  <text x="90" y="324" fill="#c4b5fd" font-size="7" text-anchor="middle">/var/opt/</text>
  <text x="90" y="338" fill="#c4b5fd" font-size="7" text-anchor="middle">memos</text>

  <!-- Arrow: Volume ↔ Memos -->
  <line x1="120" y1="305" x2="140" y2="305" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- PostgreSQL -->
  <rect x="420" y="245" width="220" height="80" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="530" y="270" fill="#a78bfa" font-size="13" text-anchor="middle" font-weight="bold">🐘 PostgreSQL (Railway Managed)</text>
  <text x="530" y="288" fill="#c4b5fd" font-size="9" text-anchor="middle">PostgreSQL 16 · DATABASE_URL injection</text>
  <text x="530" y="302" fill="#c4b5fd" font-size="9" text-anchor="middle">SSL required · Auto-managed</text>

  <!-- Arrow: Memos ↔ PostgreSQL -->
  <line x1="390" y1="285" x2="420" y2="285" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- Dependencies bar at bottom -->
  <rect x="140" y="390" width="520" height="85" rx="8" fill="rgba(30,41,59,0.3)" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="410" fill="#94a3b8" font-size="10" text-anchor="middle">Self-contained — No Redis, no external caches, no sidecars needed</text>
  <text x="180" y="435" fill="#64748b" font-size="9" text-anchor="start">Dependencies</text>
  <text x="180" y="452" fill="#94a3b8" font-size="8" text-anchor="start">• Dockerfile builds from neosmemo/memos:stable</text>
  <text x="180" y="464" fill="#94a3b8" font-size="8" text-anchor="start">• Managed PostgreSQL via Railway addon (optional)</text>

  <!-- Legend -->
  <rect x="680" y="390" width="100" height="60" rx="6" fill="rgba(15,23,42,0.8)" stroke="#475569" stroke-width="0.5"/>
  <text x="730" y="407" fill="#64748b" font-size="7" text-anchor="middle">Legend</text>
  <rect x="690" y="412" width="10" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="706" y="422" fill="#94a3b8" font-size="7">Backend</text>
  <rect x="690" y="428" width="10" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="706" y="438" fill="#94a3b8" font-size="7">Database</text>
  <rect x="690" y="442" width="10" height="10" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="706" y="452" fill="#94a3b8" font-size="7">External</text>
</svg>
